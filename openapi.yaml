      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreparedDirectoryImportInput"
      responses:
        "201":
          description: Created ingestion job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJob"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/ingestion/jobs/{jobId}:
    get:
      tags: [Ingestion]
      summary: Read ingestion job detail and draft
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      responses:
        "200":
          description: Ingestion job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/ingestion/jobs/{jobId}/review-candidates:
    get:
      tags: [Ingestion]
      summary: Read Page / Panel / Bubble candidates for review
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      responses:
        "200":
          description: Review candidates
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestionReviewCandidate"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/ingestion/jobs/{jobId}/review-decisions:
    put:
      tags: [Ingestion]
      summary: Persist one candidate review decision
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestionReviewDecisionInput"
      responses:
        "200":
          description: Updated review candidate list
          content:
            application/json:
              schema:
                type: object
                required: [ok, items]
                properties:
                  ok:
                    type: boolean
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestionReviewCandidate"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/ingestion/jobs/{jobId}/write-reviewed-draft:
    post:
      tags: [Ingestion]
      summary: Replace the draft with accepted review candidates only
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      responses:
        "200":
          description: Reviewed draft
          content:
            application/json:
              schema:
                type: object
                required: [ok, draft]
                properties:
                  ok:
                    type: boolean
                  draft:
                    $ref: "#/components/schemas/DraftPayload"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/ingestion/jobs/{jobId}/draft:
    put:
      tags: [Ingestion]
      summary: Update ingestion draft payload
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftPayload"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/ingestion/jobs/{jobId}/submit:
    post:
      tags: [Ingestion]
      summary: Submit draft for review
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/ingestion/jobs/{jobId}/confirm:
    post:
      tags: [Ingestion]
      summary: Confirm draft into contents/
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      responses:
        "200":
          description: Confirm result
          content:
            application/json:
              schema:
                type: object
                required: [confirmed, seriesId]
                properties:
                  confirmed:
                    type: boolean
                  seriesId:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/ingestion/jobs/{jobId}/cancel:
    post:
      tags: [Ingestion]
      summary: Cancel ingestion job
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/dev-login:
    post:
      tags: [Auth]
      summary: Development login
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: Session token and user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/login:
    post:
      tags: [Auth]
      summary: Magic-link login request
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Login link result
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: Email or DB not configured

  /auth/verify:
    get:
      tags: [Auth]
      summary: Magic-link verification
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: DB not configured

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user
      security:
        - {}
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                type: object
                required: [authenticated]
                properties:
                  authenticated:
                    type: boolean
                    const: false

  /admin/entitlements/grant:
    post:
      tags: [Entitlements]
      summary: Grant entitlement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantEntitlementInput"
      responses:
        "201":
          description: Entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /entitlements/check:
    get:
      tags: [Entitlements]
      summary: Check current entitlement for an episode
      security:
        - {}
        - bearerAuth: []
      parameters:
        - name: seriesId
          in: query
          required: true
          schema:
            type: string
        - name: episodeId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Access check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementCheckResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /admin/entitlements/list:
    get:
      tags: [Entitlements]
      summary: List entitlements for a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entitlements
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Entitlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/entitlements/revoke:
    post:
      tags: [Entitlements]
      summary: Revoke entitlement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entitlementId]
              properties:
                entitlementId:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/api-keys:
    get:
      tags: [RuntimeAdmin]
      summary: List API keys
      security:
        - bearerAuth: []
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: object
        "501":
          description: Requires DATABASE_URL
    post:
      tags: [RuntimeAdmin]
      summary: Create API key
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                role:
                  type: string
      responses:
        "201":
          description: API key
          content:
            application/json:
              schema:
                type: object
        "501":
          description: Requires DATABASE_URL

  /admin/api-keys/{id}/revoke:
    post:
      tags: [RuntimeAdmin]
      summary: Revoke API key
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/NotFound"
        "501":
          description: Requires DATABASE_URL

  /admin/purchases:
    get:
      tags: [RuntimeAdmin]
      summary: List purchase records
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Purchases
          content:
            application/json:
              schema:
                type: object
        "501":
          description: Requires DATABASE_URL
    post:
      tags: [RuntimeAdmin]
      summary: Create purchase record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, codes]
              properties:
                productId:
                  type: string
                codes:
                  type: array
                  items:
                    type: object
      responses:
        "201":
          description: Purchase
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "501":
          description: Requires DATABASE_URL

  /admin/auth/cleanup:
    post:
      tags: [RuntimeAdmin]
      summary: Cleanup expired and consumed auth tokens
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
        "501":
          description: Requires DATABASE_URL

  /redeem:
    post:
      tags: [Redeem]
      summary: Redeem code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Redeem result
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          description: Requires DATABASE_URL

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC session token

  parameters:
    seriesId:
      name: seriesId
      in: path
      required: true
      schema:
        type: string
    episodeId:
      name: episodeId
      in: path
      required: true
      schema:
        type: string
    pageNumber:
      name: pageNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    panelNumber:
      name: panelNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    bubbleNumber:
      name: bubbleNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    jobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    feedbackId:
      name: feedbackId
      in: path
      required: true
      schema:
        type: string
    proposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: string
    handoffId:
      name: handoffId
      in: path
      required: true
      schema:
        type: string
    verificationId:
      name: verificationId
      in: path
      required: true
      schema:
        type: string
    packDraftId:
      name: packDraftId
      in: path
      required: true
      schema:
        type: string
    grantId:
      name: grantId
      in: path
      required: true
      schema:
        type: string

  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok:
                type: boolean
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    HealthResponse:
      type: object
      required: [status, env, seriesCount, checks, ready]
      properties:
        status:
          type: string
        env:
          type: string
        seriesCount:
          type: integer
        checks:
          type: object
        ready:
          type: boolean

    BoundingBox:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        imageId:
          type: string
        coordinateSpace:
          type: string
          enum: [pixel]

    ContentFlags:
      type: object
      required: [shareable, feedback_enabled]
      properties:
        shareable:
          type: boolean
        feedback_enabled:
          type: boolean
        contains_spoiler:
          type: boolean

    PublicationVisibility:
      type: string
      enum: [public, hidden, archived]
      description: >
        Public Reader visibility state. `public` content can be shown when its
        publication window is active. `hidden` is admin-only/draft-equivalent.
        `archived` is admin-only and omitted from public discovery and direct
        reader endpoints.

    SeriesPublicationType:
      type: string
      enum: [serial, oneshot]
      description: >
        Content shape. `serial` Series have normal Series detail and Episode
        navigation. `oneshot` Series contain a single primary Episode and may
        route cards directly to that Episode.

    SeriesLifecycleStatus:
      type: string
      enum: [ongoing, completed, hiatus]
      description: >
        Production lifecycle independent from content shape. Use `ongoing` for
        active serialization, `completed` for finished works, and `hiatus` for
        paused serial works.

    ShareTargetKind:
      type: string
      enum: [episode, page, panel, bubble, clip]

    OgpTargetKind:
      type: string
      enum: [page, panel, bubble, clip]

    LocalizedContentMetadata:
      type: object
      description: Optional localized metadata for public share and crawler text.
      properties:
        title:
          type: string
        description:
          type: string
        shareTitle:
          type: string
        shareDescription:
          type: string
        authorLabel:
          type: string
          description: Localized author/creator display label for public cards and share metadata.

    PublicImageReference:
      type: object
      description: Optional public-share image reference or published asset metadata.
      properties:
        path:
          type: string
        url:
          type: string
          description: Root-relative or http(s) public URL.
        imageId:
          type: string
        contentHash:
          type: string
        revisionId:
          type: string
        alt:
          type: string
        width:
          type: number
        height:
          type: number
        mimeType:
          type: string

    CreatorCredit:
      type: object
      required: [displayName]
      description: Future-ready creator credit entry. MVP display may use ContentPublicMetadata.authorLabel.
      properties:
        role:
          type: string
          description: Free-form role label such as author, artist, writer, translator, or editor.
        displayName:
          type: string
        localizedDisplayNames:
          type: object
          additionalProperties:
            type: string
        url:
          type: string
          description: Root-relative or http(s) public URL.
        sortOrder:
          type: integer
          minimum: 0

    ContentSharePolicyMetadata:
      type: object
      properties:
        allowedTargets:
          type: array
          items:
            $ref: "#/components/schemas/ShareTargetKind"

    ContentOgpPolicyMetadata:
      type: object
      properties:
        allowedTargets:
          type: array
          items:
            $ref: "#/components/schemas/OgpTargetKind"
        allowCrop:
          type: boolean
        stylePreset:
          type: string

    ContentPublicSafetyMetadata:
      type: object
      properties:
        rightsClearedForPreview:
          type: boolean
        hidden:
          type: boolean
        archived:
          type: boolean

    ContentPublicMetadata:
      type: object
      description: >
        Optional schemaVersion: 2-compatible public share metadata extension.
        Missing metadata preserves legacy behavior.
      properties:
        revisionId:
          type: string
        publishedRevisionId:
          type: string
        contentHash:
          type: string
        publishedAt:
          type: string
          format: date-time
        canonicalLocale:
          type: string
        availableLocales:
          type: array
          items:
            type: string
        defaultReaderLocale:
          type: string
        authorLabel:
          type: string
          description: MVP single-line creator display label for public cards and share metadata.
        creatorCredits:
          type: array
          description: Future-ready ordered creator credits. Use authorLabel for MVP display when present.
          items:
            $ref: "#/components/schemas/CreatorCredit"
        localized:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LocalizedContentMetadata"
        pageImages:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PublicImageReference"
        coverImage:
          $ref: "#/components/schemas/PublicImageReference"
        shareImage:
          $ref: "#/components/schemas/PublicImageReference"
        shareImageAlt:
          type: string
        sharePolicy:
          $ref: "#/components/schemas/ContentSharePolicyMetadata"
        ogpPolicy:
          $ref: "#/components/schemas/ContentOgpPolicyMetadata"
        publicSafety:
          $ref: "#/components/schemas/ContentPublicSafetyMetadata"

    Bubble:
      type: object
      required: [bubbleId, panelId, stableRef, bubbleNumber, bubbleType, textOriginal, bbox]
      properties:
        bubbleId:
          type: string
        panelId:
          type: string
          nullable: true
        stableRef:
          type: string
        displayRef:
          type: string
        status:
          type: string
          enum: [active, deprecated, deleted, merged]
        id:
          type: string
          deprecated: true
        bubbleNumber:
          type: integer
        shortId:
          type: string
          deprecated: true
        bubbleType:
          type: string
          enum: [speech, thought, narration, sfx, caption, other]
        textOriginal:
          type: string
        speaker:
          type: string
          nullable: true
        speakerConfidence:
          type: string
          enum: [confirmed, inferred, unknown]
        textDirection:
          type: string
          enum: [horizontal, vertical]
        lang:
          type: string
        flags:
          $ref: "#/components/schemas/ContentFlags"
        metadata:
          $ref: "#/components/schemas/ContentPublicMetadata"
        bbox:
          $ref: "#/components/schemas/BoundingBox"

    Panel:
      type: object
      required: [panelId, stableRef, panelNumber, bbox, reactionTags]
      properties:
        panelId:
          type: string
        stableRef:
          type: string
        displayRef:
          type: string
        status:
          type: string
          enum: [active, deprecated, deleted, merged]
        id:
          type: string
          deprecated: true
        panelNumber:
          type: integer
        bbox:
          $ref: "#/components/schemas/BoundingBox"
        reactionTags:
          type: array
          items:
            type: string
        flags:
          $ref: "#/components/schemas/ContentFlags"
        metadata:
          $ref: "#/components/schemas/ContentPublicMetadata"

    Page:
      type: object
      required: [pageId, stableRef, pageNumber, images, width, height, panels, bubbles]
      properties:
        schemaVersion:
          type: integer
          enum: [2]
        pageId:
          type: string
        stableRef:
          type: string
        id:
          type: string
          deprecated: true
        pageNumber:
          type: integer
        images:
          type: object
          description: >
            Locale-keyed canonical Page image references. `ja` is the canonical
            source image key, `en` may point at a localized page image, and
            Reader/OGP selection should prefer the requested locale then fall
            back to canonical locale.
          additionalProperties:
            type: string
        imageId:
          type: string
        imageHash:
          type: string
        coordinateSpace:
          type: string
          enum: [pixel]
        width:
          type: number
        height:
          type: number
        displayRef:
          type: string
        status:
          type: string
          enum: [active, deprecated, deleted, merged]
        flags:
          $ref: "#/components/schemas/ContentFlags"
        metadata:
          $ref: "#/components/schemas/ContentPublicMetadata"
        panels:
          type: array
          items:
            $ref: "#/components/schemas/Panel"
        bubbles:
          type: array
          items:
            $ref: "#/components/schemas/Bubble"
        availablePacks:
          type: array
          description: Published canonical Packs with entries scoped to this Page.
          items:
