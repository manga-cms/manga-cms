components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC session token

  parameters:
    seriesId:
      name: seriesId
      in: path
      required: true
      schema:
        type: string
    episodeId:
      name: episodeId
      in: path
      required: true
      schema:
        type: string
    pageNumber:
      name: pageNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    panelNumber:
      name: panelNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    bubbleNumber:
      name: bubbleNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    jobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    feedbackId:
      name: feedbackId
      in: path
      required: true
      schema:
        type: string
    proposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: string
    packDraftId:
      name: packDraftId
      in: path
      required: true
      schema:
        type: string
    grantId:
      name: grantId
      in: path
      required: true
      schema:
        type: string

  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok:
                type: boolean
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    HealthResponse:
      type: object
      required: [status, env, seriesCount, checks, ready]
      properties:
        status:
          type: string
        env:
          type: string
        seriesCount:
          type: integer
        checks:
          type: object
        ready:
          type: boolean

    BoundingBox:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number

    ContentFlags:
      type: object
      required: [shareable, feedback_enabled]
      properties:
        shareable:
          type: boolean
        feedback_enabled:
          type: boolean
        contains_spoiler:
          type: boolean

    PublicationVisibility:
      type: string
      enum: [public, hidden, archived]
      description: >
        Public Reader visibility state. `public` content can be shown when its
        publication window is active. `hidden` is admin-only/draft-equivalent.
        `archived` is admin-only and omitted from public discovery and direct
        reader endpoints.

    Bubble:
      type: object
      required: [id, bubbleNumber, shortId, bubbleType, textOriginal, bbox]
      properties:
        id:
          type: string
        bubbleNumber:
          type: integer
        shortId:
          type: string
        bubbleType:
          type: string
          enum: [speech, thought, narration, sfx, caption, other]
        textOriginal:
          type: string
        speaker:
          type: string
          nullable: true
        speakerConfidence:
          type: string
          enum: [confirmed, inferred, unknown]
        textDirection:
          type: string
          enum: [horizontal, vertical]
        lang:
          type: string
        flags:
          $ref: "#/components/schemas/ContentFlags"
        bbox:
