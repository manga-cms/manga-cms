        public free Episode pages and redirects to the tokenized delivery
        endpoint, so raw filesystem paths are never exposed. Future dynamic OGP
        composition can replace the redirect behavior behind this stable URL.
      security: []
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: ja
        - name: locale
          in: query
          required: false
          deprecated: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to tokenized page image delivery.
          headers:
            Location:
              schema:
                type: string
                format: uri
            Cache-Control:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

