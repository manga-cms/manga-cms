      type: string
      enum: [planned, in_progress, succeeded, retryable_failed, permanent_failed, canceled]

    GitHubHandoffSyncAttemptCreateInput:
      type: object
      additionalProperties: false
      required: [target_repository]
      properties:
        statuses:
          type: array
          minItems: 1
          maxItems: 2
          items:
            $ref: "#/components/schemas/GitHubHandoffSyncEligibleStatus"
          default: [queued, ready]
        target_type:
          $ref: "#/components/schemas/GitHubHandoffTargetType"
        triage_group_key:
          type: string
          minLength: 1
          maxLength: 200
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        issue_title:
          type: string
          minLength: 1
          maxLength: 200
        target_repository:
          type: string
          pattern: "^[^/\\s]+/[^/\\s]+$"
          description: GitHub repository in owner/name form.
        target_issue_number:
          type: integer
          minimum: 1
          description: Existing triage Issue number to comment on.
        issue_grouping_rule:
          type: string
          minLength: 1
          maxLength: 200
          description: Rule for choosing or creating the future triage Issue.
        max_attempts:
          type: integer
          minimum: 1
          maximum: 10
        next_retry_at:
          type: string
          format: date-time
        rate_limit_reset_at:
          type: string
          format: date-time
      description: >
        Request body for storing a planned attempt. The API recomputes the
        dry-run result server-side and requires either target_issue_number or
        issue_grouping_rule.

    GitHubHandoffSyncAttemptRecord:
      type: object
      required:
        - attempt_id
        - status
        - handoff_ids
        - selected_statuses
        - skipped
        - target_repository
        - draft
        - draft_body_hash
        - idempotency_key
        - dedupe_keys
        - retry_policy
        - attempt_count
        - max_attempts
        - created_at
        - updated_at
      properties:
        attempt_id:
          type: string
        status:
          $ref: "#/components/schemas/GitHubHandoffSyncAttemptStatus"
        handoff_ids:
          type: array
          items:
            type: string
        selected_statuses:
          type: array
          items:
            $ref: "#/components/schemas/GitHubHandoffSyncEligibleStatus"
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/GitHubHandoffSyncSkippedItem"
        target_repository:
          type: string
        target_issue_number:
          type: integer
        issue_grouping_rule:
          type: string
        triage_group_key:
          type: string
        draft:
          $ref: "#/components/schemas/GitHubTriageDraft"
        draft_body_hash:
          type: string
        idempotency_key:
          type: string
        dedupe_keys:
          type: array
          items:
            type: string
        retry_policy:
          type: object
          required: [max_attempts, initial_backoff_seconds, max_backoff_seconds, retry_on]
          properties:
            max_attempts:
              type: integer
            initial_backoff_seconds:
              type: integer
            max_backoff_seconds:
              type: integer
            retry_on:
              type: array
              items:
                type: string
        attempt_count:
          type: integer
        max_attempts:
          type: integer
        next_retry_at:
          type: string
          format: date-time
        rate_limit_reset_at:
          type: string
          format: date-time
        last_error:
          type: string
        github_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GitHubHandoffSyncAttemptStatusUpdateInput:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [in_progress, succeeded, retryable_failed, permanent_failed, canceled]
        attempt_count:
          type: integer
          minimum: 0
          maximum: 100
        last_error:
          type: string
          maxLength: 2000
        next_retry_at:
          type: string
          format: date-time
        rate_limit_reset_at:
          type: string
          format: date-time
        github_url:
          type: string
          format: uri
      description: >
        Lifecycle update input. `succeeded` requires `github_url`; other
        statuses may update attempt_count, last_error, next_retry_at, and
        rate_limit_reset_at without posting to GitHub.

