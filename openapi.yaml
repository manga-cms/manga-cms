openapi: 3.1.0
info:
  title: Manga CMS API
  version: 0.1.0
  description: >
    Contract for the current manga-cms API. Canonical content remains in
    contents/ and uses Series -> Episode -> Page -> Panel -> Bubble terms.

servers:
  - url: https://api.example.com/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Health
  - name: Reader
  - name: Feedback
  - name: Identity
  - name: Proposals
  - name: GitHubHandoff
  - name: PackManager
  - name: Delivery
  - name: AdminContent
  - name: Ingestion
  - name: Auth
  - name: Entitlements
  - name: RuntimeAdmin
  - name: Redeem

paths:
  /health:
    get:
      tags: [Health]
      summary: API and dependency health
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /series:
    get:
      tags: [Reader]
      summary: List public Series summaries
      description: >
        Returns Series whose publication visibility is currently public. Hidden,
        archived, scheduled, and expired Series are omitted.
      security: []
      responses:
        "200":
          description: Series summaries
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeriesSummary"

  /series/{seriesId}:
    get:
      tags: [Reader]
      summary: Read Series detail and Episode summaries
      description: >
        Returns a public Series and only currently public Episode summaries.
        Hidden, archived, scheduled, and expired Series return 404.
      security: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
      responses:
        "200":
          description: Series detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /series/{seriesId}/episodes/{episodeId}:
    get:
      tags: [Reader]
      summary: Read Episode metadata and navigation
      description: >
        Returns delivery URLs for entitled/free content. Locked episodes return
        `gated: true` and no page payloads. Draft/hidden, scheduled, expired,
        or archived Series/Episodes are not gated; they return 404.
      security:
        - {}
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
      responses:
        "200":
          description: Episode payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /series/{seriesId}/episodes/{episodeId}/pages/{pageNumber}:
    get:
      tags: [Reader]
      summary: Get reader Page payload
      description: >
        Returns page metadata, tokenized delivery image URLs, panel/bubble
        references, and available packs. Locked pages return `gated: true` and
        omit image URLs and panel details. Draft/hidden, scheduled, expired,
        or archived Series/Episodes return 404.
      security:
        - {}
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
        - $ref: "#/components/parameters/pageNumber"
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: ja
        - name: packs
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
      responses:
        "200":
          description: Reader Page payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReaderPageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /quotes/{seriesId}/{episodeId}/{pageNumber}/{panelNumber}/{bubbleNumber}:
    get:
      tags: [Reader]
      summary: Read Bubble quote payload
      security: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
        - $ref: "#/components/parameters/pageNumber"
        - $ref: "#/components/parameters/panelNumber"
        - $ref: "#/components/parameters/bubbleNumber"
      responses:
        "200":
          description: Quote payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /clips/{seriesId}/{episodeId}/{pageNumber}/{panelStart}/{panelEnd}:
    get:
      tags: [Reader]
      summary: Read Panel range clip payload
      security: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
        - $ref: "#/components/parameters/pageNumber"
        - name: panelStart
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: panelEnd
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Clip payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /reactions:
    get:
      tags: [Reader]
      summary: Search official reaction Panels
      security: []
      parameters:
        - name: tag
          in: query
          required: true
          schema:
            type: string
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Reaction search results
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReactionItem"
        "400":
          $ref: "#/components/responses/BadRequest"

  /feedback:
    post:
      tags: [Feedback]
      summary: Submit reader feedback
      description: >
        Stores private reader feedback for internal CMS triage and does not
        mutate canonical content or create GitHub Issues. Public Reader
        submissions may use `anonymous` or `display_name` contributor identity.
        Verified `github_login` identity requires a server-side GitHub
        verification path and is not accepted by this public endpoint yet.
      security:
        - {}
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackPayload"
      responses:
        "201":
          description: Feedback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /feedback/{feedbackId}/status:
    get:
      tags: [Feedback]
      summary: Read public feedback status
      description: >
        Returns minimal public status for a submitted feedback ID. This endpoint
        is intended for submitters to check triage state and does not expose
        private comment text, contributor identity, client IP, or admin notes.
      security: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      responses:
        "200":
          description: Public feedback status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackPublicStatus"
        "404":
          $ref: "#/components/responses/NotFound"

  /identity/github/oauth/callback:
    post:
      tags: [Identity]
      summary: Verify GitHub identity through server-side OAuth callback
      description: >
        Contract placeholder for server-side GitHub OAuth identity verification.
        The current skeleton validates the callback payload and returns 501
        until GitHub token exchange and user lookup are wired. It does not post
        to GitHub or create Issues/PRs.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubOAuthCallbackInput"
      responses:
        "200":
          description: Verified GitHub identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubIdentityVerificationRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "501":
          description: OAuth callback is contracted but not implemented

  /admin/identity/github/verifications:
    get:
      tags: [Identity]
      summary: List verified GitHub identity records
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GitHubIdentityVerificationStatus"
        - name: githubLogin
          in: query
          required: false
          schema:
            type: string
        - name: subjectUserId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Verified GitHub identity records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/GitHubIdentityVerificationRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Identity]
      summary: Create a trusted-admin verified GitHub identity record
      description: >
        Trusted admin path for recording a verified GitHub login when OAuth is
        not yet wired. This creates private runtime verification state and does
        not call GitHub.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubIdentityTrustedCreateInput"
      responses:
        "201":
          description: Verified GitHub identity record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubIdentityVerificationRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/identity/github/verifications/{verificationId}:
    get:
      tags: [Identity]
      summary: Read one verified GitHub identity record
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/verificationId"
      responses:
        "200":
          description: Verified GitHub identity record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubIdentityVerificationRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/identity/github/verifications/{verificationId}/revoke:
    post:
      tags: [Identity]
      summary: Revoke a verified GitHub identity record
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/verificationId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubIdentityVerificationRevokeInput"
      responses:
        "200":
          description: Verified GitHub identity record revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubIdentityVerificationRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/feedback:
    get:
      tags: [Feedback]
      summary: List feedback records for CMS triage
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FeedbackStatus"
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Feedback records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedbackRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/feedback/{feedbackId}:
    get:
      tags: [Feedback]
      summary: Read one feedback record for CMS triage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      responses:
        "200":
          description: Feedback record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/feedback/{feedbackId}/status:
    put:
      tags: [Feedback]
      summary: Update feedback triage status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackStatusUpdateInput"
      responses:
        "200":
          description: Updated feedback record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/feedback/{feedbackId}/proposal:
    post:
      tags: [Proposals]
      summary: Convert private feedback into a CMS proposal
      description: Creates a Proposal Queue record from a Reader feedback record and marks the feedback triaged.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/feedback/{feedbackId}/github-handoff:
    post:
      tags: [GitHubHandoff]
      summary: Queue a GitHub handoff for one feedback record
      description: >
        Creates private handoff intent only. No GitHub API call is made.
        Direct issue or PR modes require a verified `github_login` contributor
        identity; anonymous and display-name identities are limited to
        `triage_issue_comment`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubHandoffTargetCreateInput"
      responses:
        "201":
          description: GitHub handoff queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubHandoffRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/proposals:
    get:
      tags: [Proposals]
      summary: List CMS proposal records
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProposalStatus"
        - name: kind
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProposalKind"
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Proposal records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProposalRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Proposals]
      summary: Create a CMS proposal record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalCreateInput"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/proposals/{proposalId}:
    get:
      tags: [Proposals]
      summary: Read one proposal record
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/proposalId"
      responses:
        "200":
          description: Proposal record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/proposals/{proposalId}/status:
    put:
      tags: [Proposals]
      summary: Update proposal review status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/proposalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalStatusUpdateInput"
      responses:
        "200":
          description: Updated proposal record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/proposals/{proposalId}/github-handoff:
    post:
      tags: [GitHubHandoff]
      summary: Queue a GitHub handoff for one proposal record
      description: >
        Creates private handoff intent only. No GitHub API call is made.
        Direct issue or PR modes require a verified `github_login` contributor
        identity; anonymous and display-name identities are limited to
        `triage_issue_comment`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/proposalId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubHandoffTargetCreateInput"
      responses:
        "201":
          description: GitHub handoff queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubHandoffRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/github-handoffs:
    get:
      tags: [GitHubHandoff]
      summary: List queued GitHub handoff records
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GitHubHandoffStatus"
        - name: targetType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GitHubHandoffTargetType"
        - name: targetId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: GitHub handoff records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/GitHubHandoffRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [GitHubHandoff]
      summary: Queue a GitHub handoff record
      description: >
        Creates private handoff intent only. No GitHub API call is made.
        Default mode is `triage_issue_comment`. Direct issue or PR modes are
        rejected unless contributor identity is verified `github_login`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubHandoffCreateInput"
      responses:
        "201":
          description: GitHub handoff queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubHandoffRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/github-handoffs/triage-draft:
    post:
      tags: [GitHubHandoff]
      summary: Generate a GitHub triage Issue draft
      description: >
        Builds a bot-authored Markdown draft from queued
        `triage_issue_comment` handoff records. This endpoint does not call the
        GitHub API and does not change handoff status. Operators or a later
        sync worker can use the returned Markdown as the body of an
        Episode-level or daily triage Issue/comment.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubTriageDraftInput"
      responses:
        "200":
          description: GitHub triage draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubTriageDraft"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/github-handoffs/sync-dry-run:
    post:
      tags: [GitHubHandoff]
      summary: Dry-run the GitHub handoff sync worker
      description: >
        Selects queued/ready handoff records, generates the triage Markdown
        draft, and returns the planned sync result without calling GitHub or
        mutating handoff status. This is the contract for a later GitHub App or
        token-backed sync worker.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubHandoffSyncDryRunInput"
      responses:
        "200":
          description: GitHub handoff sync dry-run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubHandoffSyncDryRunResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/github-handoffs/sync-attempts:
    get:
      tags: [GitHubHandoff]
      summary: List GitHub handoff sync attempts
      description: >
        Lists private sync-attempt runtime state. Attempts are planning and
        retry state only; this endpoint does not call GitHub.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GitHubHandoffSyncAttemptStatus"
        - name: targetRepository
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: GitHub handoff sync attempts
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/GitHubHandoffSyncAttemptRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/github-handoffs/sync-attempts/planned:
    post:
      tags: [GitHubHandoff]
      summary: Create a planned GitHub handoff sync attempt
      description: >
        Recomputes the sync dry-run result from queued/ready handoff records
        and stores a planned sync attempt with retry, rate-limit, and dedupe
        state. This endpoint does not call GitHub or mutate handoff status.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubHandoffSyncAttemptCreateInput"
      responses:
        "201":
          description: Planned GitHub handoff sync attempt created
          content:
