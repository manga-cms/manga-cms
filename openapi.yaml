        pages:
          type: array
          description: Optional explicit page mapping. If omitted, supported image files in sourceDir are sorted by filename.
          items:
            type: object
            required: [sourcePath]
            properties:
              sourcePath:
                type: string
              pageNumber:
                type: integer
              displayRef:
                type: string
              width:
                type: integer
              height:
                type: integer

    DraftPage:
      type: object
      required: [pageNumber, imagePath, width, height, panels]
      properties:
        pageNumber:
          type: integer
        imagePath:
          type: string
        sourceImagePath:
          type: string
          description: Draft asset source copied into canonical contents only when the ingestion job is confirmed.
        width:
          type: integer
        height:
          type: integer
        displayRef:
          type: string
        panels:
          type: array
          items:
            $ref: "#/components/schemas/DraftPanel"

    DraftPanel:
      type: object
      required: [panelNumber, bbox, reactionTags, bubbles]
      properties:
        panelNumber:
          type: integer
        bbox:
          $ref: "#/components/schemas/BoundingBox"
        reactionTags:
          type: array
          items:
            type: string
        bubbles:
          type: array
          items:
            $ref: "#/components/schemas/DraftBubble"

    DraftBubble:
      type: object
      required: [bubbleNumber, bubbleType, textOriginal]
      properties:
        bubbleNumber:
          type: integer
        bubbleType:
          type: string
          enum: [speech, thought, narration, sfx, caption, other]
        textOriginal:
          type: string
        speaker:
          type: string
        bbox:
          $ref: "#/components/schemas/BoundingBox"
        shortId:
          type: string
        speakerConfidence:
          type: string
          enum: [confirmed, inferred, unknown]
        textDirection:
          type: string
          enum: [horizontal, vertical]
        lang:
          type: string
        flags:
          $ref: "#/components/schemas/ContentFlags"

    IngestionReviewTarget:
      type: object
      required: [kind, pageNumber, panelNumber]
      properties:
        kind:
          type: string
          enum: [panel, bubble]
        pageNumber:
          type: integer
        panelNumber:
          type: integer
        bubbleNumber:
          type: integer

    IngestionReviewDecision:
      type: object
      required: [key, target, decision, updatedAt]
      properties:
        key:
          type: string
        target:
          $ref: "#/components/schemas/IngestionReviewTarget"
        decision:
          type: string
          enum: [pending, accepted, rejected]
        note:
          type: string
        reviewerId:
          type: string
        updatedAt:
          type: string

    IngestionReviewDecisionInput:
      type: object
      required: [target, decision]
      properties:
        target:
          $ref: "#/components/schemas/IngestionReviewTarget"
        decision:
          type: string
          enum: [pending, accepted, rejected]
        note:
          type: string

    IngestionReviewCandidate:
      type: object
      required: [key, target, decision]
      properties:
        key:
          type: string
        target:
          $ref: "#/components/schemas/IngestionReviewTarget"
        decision:
          type: string
          enum: [pending, accepted, rejected]
        panel:
          $ref: "#/components/schemas/DraftPanel"
        bubble:
          $ref: "#/components/schemas/DraftBubble"

    IngestionJob:
      type: object
      required: [id, status, createdAt, updatedAt, label, draft]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [queued, draft, waiting_review, confirmed, failed, canceled]
        createdAt:
          type: string
        updatedAt:
          type: string
        label:
          type: string
        draft:
          anyOf:
            - $ref: "#/components/schemas/DraftPayload"
            - type: "null"
        errorMessage:
          type: string

    User:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, user]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    MeResponse:
      type: object
      required: [authenticated, user]
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/User"

    GrantEntitlementInput:
      type: object
      required: [userId, targetId]
      properties:
        userId:
          type: string
        targetType:
          type: string
          enum: [SERIES, EPISODE, VOLUME, PACK, BUNDLE]
          default: EPISODE
        targetId:
          type: string
        source:
          type: string
          enum: [PURCHASE, CONTRIBUTOR_REWARD, PROMO, ADMIN_GRANT, SUBSCRIPTION]
          default: ADMIN_GRANT

    Entitlement:
      type: object
      required: [id, userId, targetType, targetId, source, status, grantedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        targetType:
          type: string
        targetId:
          type: string
        source:
          type: string
        status:
          type: string
        grantedAt:
          type: string

    EntitlementCheckResponse:
      type: object
      required: [entitled]
      properties:
        entitled:
          type: boolean
        free:
          type: boolean
        userId:
          type: string
        reason:
          type: string
