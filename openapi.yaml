openapi: 3.1.0
info:
  title: Manga CMS API
  version: 0.1.0
  description: >
    Contract for the current manga-cms API. Canonical content remains in
    contents/ and uses Series -> Episode -> Page -> Panel -> Bubble terms.

servers:
  - url: https://api.example.com/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Health
  - name: Reader
  - name: Feedback
  - name: Proposals
  - name: PackManager
  - name: Delivery
  - name: AdminContent
  - name: Ingestion
  - name: Auth
  - name: Entitlements
  - name: RuntimeAdmin
  - name: Redeem

paths:
  /health:
    get:
      tags: [Health]
      summary: API and dependency health
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /series:
    get:
      tags: [Reader]
      summary: List public Series summaries
      description: >
        Returns Series whose publication visibility is currently public. Hidden,
        archived, scheduled, and expired Series are omitted.
      security: []
      responses:
        "200":
          description: Series summaries
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeriesSummary"

  /series/{seriesId}:
    get:
      tags: [Reader]
      summary: Read Series detail and Episode summaries
      description: >
        Returns a public Series and only currently public Episode summaries.
        Hidden, archived, scheduled, and expired Series return 404.
      security: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
      responses:
        "200":
          description: Series detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /series/{seriesId}/episodes/{episodeId}:
    get:
      tags: [Reader]
      summary: Read Episode metadata and navigation
      description: >
        Returns delivery URLs for entitled/free content. Locked episodes return
        `gated: true` and no page payloads. Draft/hidden, scheduled, expired,
        or archived Series/Episodes are not gated; they return 404.
      security:
        - {}
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
      responses:
        "200":
          description: Episode payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /series/{seriesId}/episodes/{episodeId}/pages/{pageNumber}:
    get:
      tags: [Reader]
      summary: Get reader Page payload
      description: >
        Returns page metadata, tokenized delivery image URLs, panel/bubble
        references, and available packs. Locked pages return `gated: true` and
        omit image URLs and panel details. Draft/hidden, scheduled, expired,
        or archived Series/Episodes return 404.
      security:
        - {}
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
        - $ref: "#/components/parameters/pageNumber"
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: ja
        - name: packs
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
      responses:
        "200":
          description: Reader Page payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReaderPageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /quotes/{seriesId}/{episodeId}/{pageNumber}/{panelNumber}/{bubbleNumber}:
    get:
      tags: [Reader]
      summary: Read Bubble quote payload
      security: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
        - $ref: "#/components/parameters/pageNumber"
        - $ref: "#/components/parameters/panelNumber"
        - $ref: "#/components/parameters/bubbleNumber"
      responses:
        "200":
          description: Quote payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /clips/{seriesId}/{episodeId}/{pageNumber}/{panelStart}/{panelEnd}:
    get:
      tags: [Reader]
      summary: Read Panel range clip payload
      security: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
        - $ref: "#/components/parameters/episodeId"
        - $ref: "#/components/parameters/pageNumber"
        - name: panelStart
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: panelEnd
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Clip payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /reactions:
    get:
      tags: [Reader]
      summary: Search official reaction Panels
      security: []
      parameters:
        - name: tag
          in: query
          required: true
          schema:
            type: string
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Reaction search results
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReactionItem"
        "400":
          $ref: "#/components/responses/BadRequest"

  /feedback:
    post:
      tags: [Feedback]
      summary: Submit reader feedback
      description: Stores private reader feedback and does not mutate canonical content.
      security:
        - {}
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackPayload"
      responses:
        "201":
          description: Feedback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /admin/feedback:
    get:
      tags: [Feedback]
      summary: List feedback records for CMS triage
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FeedbackStatus"
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Feedback records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedbackRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/feedback/{feedbackId}:
    get:
      tags: [Feedback]
      summary: Read one feedback record for CMS triage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      responses:
        "200":
          description: Feedback record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/feedback/{feedbackId}/status:
    put:
      tags: [Feedback]
      summary: Update feedback triage status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackStatusUpdateInput"
      responses:
        "200":
          description: Updated feedback record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/feedback/{feedbackId}/proposal:
    post:
      tags: [Proposals]
      summary: Convert private feedback into a CMS proposal
      description: Creates a Proposal Queue record from a Reader feedback record and marks the feedback triaged.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/feedbackId"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/proposals:
    get:
      tags: [Proposals]
      summary: List CMS proposal records
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProposalStatus"
        - name: kind
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProposalKind"
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Proposal records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProposalRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Proposals]
      summary: Create a CMS proposal record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalCreateInput"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/proposals/{proposalId}:
    get:
      tags: [Proposals]
      summary: Read one proposal record
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/proposalId"
      responses:
        "200":
          description: Proposal record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/proposals/{proposalId}/status:
    put:
      tags: [Proposals]
      summary: Update proposal review status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/proposalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalStatusUpdateInput"
      responses:
        "200":
          description: Updated proposal record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/pack-drafts:
    get:
      tags: [PackManager]
      summary: List runtime Pack draft records
      description: Lists CMS-managed Pack drafts. These records are runtime review state and do not write canonical `packs/`.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackDraftStatus"
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackType"
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Pack draft records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PackDraftRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [PackManager]
      summary: Create a runtime Pack draft
      description: Creates a draft review record only. It does not publish a Pack or modify canonical content.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackDraftCreateInput"
      responses:
        "201":
          description: Pack draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackDraftRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/pack-drafts/{packDraftId}:
    get:
      tags: [PackManager]
      summary: Read one runtime Pack draft
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/packDraftId"
      responses:
        "200":
          description: Pack draft record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackDraftRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/pack-drafts/{packDraftId}/status:
    put:
      tags: [PackManager]
      summary: Update Pack draft review status
      description: Updates runtime review state only. `published` is an intent/status value here and does not write canonical `packs/`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/packDraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackDraftStatusUpdateInput"
      responses:
        "200":
          description: Updated Pack draft record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackDraftRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/pack-drafts/{packDraftId}/adopt-proposal:
    post:
      tags: [PackManager]
      summary: Adopt an accepted Proposal into a Pack draft
      description: >
        Adds a Pack draft entry from an accepted Proposal Queue record. This does
        not modify canonical Episode JSON or published Pack manifests.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/packDraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackDraftAdoptProposalInput"
      responses:
        "200":
          description: Pack draft with adopted entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackDraftRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/pack-drafts/{packDraftId}/export:
    post:
      tags: [PackManager]
      summary: Export a Pack draft into canonical packs storage
      description: >
        Writes `packs/{pack_id}/pack.json` from an approved or published runtime
        Pack draft. This is the explicit boundary where review state becomes a
        canonical Pack manifest.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/packDraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackDraftExportInput"
      responses:
        "200":
          description: Pack manifest exported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackDraftExportResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/rights/grants:
    get:
      tags: [Rights]
      summary: List runtime Rights grants
      description: Lists CMS governance grants. These records are runtime permission state and are separate from reader entitlements.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: seriesId
          in: query
          required: false
          schema:
            type: string
        - name: permission
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RightsPermission"
        - name: includeRevoked
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Rights grant records
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RightsGrantRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Rights]
      summary: Create a runtime Rights grant
      description: Creates a governance grant only. It does not grant reader entitlement or mutate canonical content.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RightsGrantCreateInput"
      responses:
        "201":
          description: Rights grant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RightsGrantRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/rights/grants/{grantId}/revoke:
    post:
      tags: [Rights]
      summary: Revoke a runtime Rights grant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/grantId"
      responses:
        "200":
          description: Revoked Rights grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RightsGrantRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/rights/check:
    post:
      tags: [Rights]
      summary: Check whether a user has a Rights permission
      description: Checks runtime governance grants only. This endpoint does not check reader entitlements.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RightsPermissionCheckInput"
      responses:
        "200":
          description: Rights permission check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RightsPermissionCheckResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /deliver/{pageId}:
    get:
      tags: [Delivery]
      summary: Token-verified image delivery
      description: >
        Serves a page image only when the short-lived delivery token matches
        the requested page. The current implementation accepts `lang` and the
        legacy `locale` query name.
      security:
        - {}
        - bearerAuth: []
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: ja
        - name: locale
          in: query
          required: false
          deprecated: true
          schema:
            type: string
      responses:
        "200":
          description: Image bytes, or a JSON placeholder when the image file is absent locally.
          headers:
            Cache-Control:
              schema:
                type: string
            X-Watermark-Applied:
              schema:
                type: string
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/series:
    get:
      tags: [AdminContent]
      summary: List Series for CMS editing
      description: Returns all Series, including hidden, archived, scheduled, and expired Series.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin Series summaries
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeriesSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [AdminContent]
      summary: Create Series
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeriesInput"
      responses:
        "201":
          description: Created Series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/series/{seriesId}:
    get:
      tags: [AdminContent]
      summary: Read Series for CMS editing
      description: Returns one Series with all Episode summaries, bypassing Public Reader visibility gating.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
      responses:
        "200":
          description: Admin Series detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [AdminContent]
      summary: Update Series metadata
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/seriesId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSeriesInput"
      responses:
        "200":
          description: Updated Series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/series/{seriesId}/episodes:
