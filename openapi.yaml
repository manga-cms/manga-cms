  /deliver/{pageId}:
    get:
      tags: [Delivery]
      summary: Token-verified image delivery
      description: >
        Serves a page image only when the short-lived delivery token matches
        the requested page. The current implementation accepts `lang` and the
        legacy `locale` query name.
      security:
        - {}
        - bearerAuth: []
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: ja
        - name: locale
          in: query
          required: false
          deprecated: true
          schema:
            type: string
      responses:
        "200":
          description: Image bytes, or a JSON placeholder when the image file is absent locally.
          headers:
            Cache-Control:
              schema:
                type: string
            X-Watermark-Applied:
              schema:
                type: string
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

