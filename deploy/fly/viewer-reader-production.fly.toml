# Fly.io production config for the Manga CMS public Reader.
# Serves reader URLs intended for https://read.manga-cms.com.

app = "manga-cms-reader-prod"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.viewer"
  ignorefile = ".dockerignore"

  [build.args]
    API_BASE = "https://api.manga-cms.com/api/v1"
    SITE_MODE = "serial"
    SITE_ORIGIN = "https://read.manga-cms.com"
    SITE_ROOT_REDIRECT_ORIGIN = "https://manga-cms.com/"
    SITE_ALLOWED_SERIES_IDS = "oumaga-dokidoki"
    READER_TEXT_OVERLAY_EPISODES = "oumaga-dokidoki:ep01"
    PUBLIC_ANALYTICS_ENV = "production"
    PUBLIC_CLOUDFLARE_WEB_ANALYTICS_ENABLED = "true"
    PUBLIC_ANALYTICS_ENABLED = "false"
    PUBLIC_INDEX_EN_LOCALE = "false"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "4321"
  API_BASE = "https://api.manga-cms.com/api/v1"
  SITE_MODE = "serial"
  SITE_ORIGIN = "https://read.manga-cms.com"
  SITE_ROOT_REDIRECT_ORIGIN = "https://manga-cms.com/"
  SITE_ALLOWED_SERIES_IDS = "oumaga-dokidoki"
  READER_TEXT_OVERLAY_EPISODES = "oumaga-dokidoki:ep01"
  PUBLIC_ANALYTICS_ENV = "production"
  PUBLIC_CLOUDFLARE_WEB_ANALYTICS_ENABLED = "true"
  PUBLIC_ANALYTICS_ENABLED = "false"
  PUBLIC_INDEX_EN_LOCALE = "false"

[http_service]
  internal_port = 4321
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines = 1
  processes = ["app"]

[checks]
  [checks.home]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/robots.txt"
    port = 4321
    timeout = "3s"
    type = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
