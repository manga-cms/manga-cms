# Fly.io production config for the Manga CMS creator CMS.
# Serves the static CMS SPA intended for https://cms.manga-cms.com.

app = "manga-cms-cms-prod"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.cms"
  ignorefile = ".dockerignore"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines = 1
  processes = ["app"]

[checks]
  [checks.home]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/"
    port = 5173
    timeout = "3s"
    type = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
