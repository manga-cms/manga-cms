# Fly.io production config for the manga-cms API.
# Runtime state uses Fly Postgres through DATABASE_URL.
# Canonical manga content remains file-backed under /data/contents.

app = "manga-cms-api-prod"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.api"
  ignorefile = ".dockerignore"

[build.args]
  PRISMA_PROVIDER = "postgresql"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  PRISMA_PROVIDER = "postgresql"
  CONTENTS_DIR = "/data/contents"
  PACKS_DIR = "/data/packs"
  FEEDBACK_DIR = "/data/feedback"
  PROPOSALS_DIR = "/data/proposals"
  PACK_DRAFTS_DIR = "/data/pack-drafts"
  DRAFTS_DIR = "/data/drafts"
  IMPORTS_DIR = "/data/imports"
  DRAFT_ASSETS_DIR = "/data/draft-assets"
  RIGHTS_DIR = "/data/rights"
  GITHUB_HANDOFF_DIR = "/data/github-handoffs"
  GITHUB_IDENTITY_DIR = "/data/github-identities"
  APP_URL = "https://api.manga-cms.com/api/v1"
  DELIVERY_PUBLIC_ORIGIN = "https://api.manga-cms.com"
  ALLOWED_ORIGINS = "https://manga-cms.com,https://read.manga-cms.com,https://cms.manga-cms.com"
  TRUST_PROXY = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines = 1
  processes = ["app"]

[[mounts]]
  source = "manga_cms_api_prod_data"
  destination = "/data"
  processes = ["app"]

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/v1/health"
    port = 3000
    timeout = "3s"
    type = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
