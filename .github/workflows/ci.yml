name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@9.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @manga/db db:generate

      - name: Build schemas package
        run: pnpm --filter @manga/schemas build

      - name: Build domain package
        run: pnpm --filter @manga/domain build

      - name: Build DB package
        run: pnpm --filter @manga/db build

      - name: Build ingestion package
        run: pnpm --filter @manga/ingestion build

      - name: Build API app
        run: pnpm --filter @manga/api build

      - name: Build Viewer app
        run: pnpm --filter @manga/viewer build

      - name: Build CMS app
        run: pnpm --filter @manga/cms build

      - name: Run CMS tests
        run: pnpm --filter @manga/cms test

      - name: Run ingestion tests
        run: pnpm --filter @manga/ingestion test

      - name: Validate content schemas
        run: |
          node --input-type=module -e "
            import { FileContentRepository } from './packages/domain/dist/index.js';
            const repo = new FileContentRepository('./contents');
            const series = repo.listSeries();
            console.log('Content validation passed:', series.length, 'series');
            if (series.length === 0) { console.log('No content to validate, skipping.'); process.exit(0); }
          "
